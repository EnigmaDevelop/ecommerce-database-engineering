version: '3.8'

services:
  # 1. Apache Kafka Dependency: Zookeeper Coordination Service
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: lh_zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    networks:
      - lh_network

  # 2. Apache Kafka: Event Streaming Message Broker
  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: lh_kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    networks:
      - lh_network

  # 3. MinIO: S3-Compatible Object Storage (Data Lake Core)
  minio:
    image: minio/minio:RELEASE.2024-01-28T22-35-53Z
    container_name: lh_minio
    ports:
      - "9000:9000"  # S3 API Endpoint
      - "9001:9001"  # Visual Browser Console Dashboard
    environment:
      MINIO_ROOT_USER: admin
      MINIO_ROOT_PASSWORD: minio_password123
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    networks:
      - lh_network

  # 4. PySpark Data Processing Stack with Integrated Jupyter Notebook
  spark-jupyter:
    image: jupyter/pyspark-notebook:spark-3.5.0
    container_name: lh_spark_jupyter
    user: root
    ports:
      - "8888:8888"  # Jupyter Web Interface
      - "4040:4040"  # Spark Live Application UI Tracking Console
    environment:
      JUPYTER_ENABLE_LAB: "yes"
      JUPYTER_TOKEN: "lakehouse_secret_2026"
    volumes:
      - ./notebooks:/home/jovyan/work/notebooks
    networks:
      - lh_network

networks:
  lh_network:
    driver: bridge

volumes:
  minio_data:
    driver: local
